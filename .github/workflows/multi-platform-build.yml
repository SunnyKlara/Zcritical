name: Multi-Platform Build and Release

on:
  push:
    tags: ['v*', 'app-v*']
  pull_request:
    branches: [main]
    paths: ['RideWind/**']
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS IPA'
        type: boolean
        default: true

env:
  FLUTTER_VERSION: '3.x'

jobs:
  # ---------------------------------------------------------------
  #  Code Quality Check
  # ---------------------------------------------------------------
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: RideWind
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        working-directory: RideWind
      - name: Run tests
        run: flutter test --reporter compact --timeout 600s
        working-directory: RideWind

  # ---------------------------------------------------------------
  #  Android APK Build (signed + version from tag)
  # ---------------------------------------------------------------
  build-android:
    name: Build Android APK
    needs: analyze
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_android }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: RideWind

      # --- Release signing setup ---
      - name: Setup release signing
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > RideWind/android/app/zcritical-release.jks
          cat > RideWind/android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storeFile=zcritical-release.jks
          EOF

      # --- Version extraction from tag ---
      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#app-}"
            VERSION="${VERSION#v}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "HAS_TAG=true" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version:' RideWind/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "HAS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Build APK (split per ABI)
        run: |
          if [ "${{ steps.version.outputs.HAS_TAG }}" = "true" ]; then
            BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
            flutter build apk --release --split-per-abi \
              --build-name=${{ steps.version.outputs.VERSION }} \
              --build-number=$BUILD_NUMBER
          else
            flutter build apk --debug
          fi
        working-directory: RideWind

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: RideWind/build/app/outputs/flutter-apk/app-*.apk
          retention-days: 30

  # ---------------------------------------------------------------
  #  iOS Build + TestFlight Upload (App Store Connect API Auto-Signing)
  # ---------------------------------------------------------------
  build-ios:
    name: Build iOS & Upload TestFlight
    needs: analyze
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: RideWind
      - name: Install CocoaPods
        run: |
          cd RideWind/ios
          pod install --repo-update

      # --- Check API Key availability ---
      - name: Check signing prerequisites
        id: signing
        env:
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
        run: |
          if [ -z "$APPSTORE_CONNECT_API_KEY_ID" ] || [ -z "$APPSTORE_CONNECT_ISSUER_ID" ] || [ -z "$APPSTORE_CONNECT_API_KEY" ]; then
            echo "::warning::App Store Connect API Key not fully configured. Need: APPSTORE_CONNECT_API_KEY_ID, APPSTORE_CONNECT_ISSUER_ID, APPSTORE_CONNECT_API_KEY"
            echo "HAS_API_KEY=false" >> $GITHUB_OUTPUT
          else
            echo "HAS_API_KEY=true" >> $GITHUB_OUTPUT
          fi

      # --- Setup API Key for xcodebuild automatic signing ---
      - name: Setup App Store Connect API Key
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.HAS_API_KEY == 'true'
        env:
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
        run: |
          # Write API Key .p8 file for xcodebuild
          API_KEY_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$API_KEY_DIR"
          echo -n "$APPSTORE_CONNECT_API_KEY" > "$API_KEY_DIR/AuthKey_${APPSTORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$API_KEY_DIR/AuthKey_${APPSTORE_CONNECT_API_KEY_ID}.p8"

          # Export paths for subsequent steps
          echo "API_KEY_PATH=$API_KEY_DIR/AuthKey_${APPSTORE_CONNECT_API_KEY_ID}.p8" >> $GITHUB_ENV
          echo "API_KEY_ID=$APPSTORE_CONNECT_API_KEY_ID" >> $GITHUB_ENV
          echo "API_ISSUER_ID=$APPSTORE_CONNECT_ISSUER_ID" >> $GITHUB_ENV

          echo "✅ API Key written to $API_KEY_DIR"

      # --- Build iOS (no-codesign for PR builds) ---
      - name: Build iOS (no codesign - PR only)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: flutter build ios --release --no-codesign
        working-directory: RideWind

      # --- Ensure Xcode project uses automatic signing ---
      - name: Configure automatic signing
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.HAS_API_KEY == 'true'
        run: |
          PBXPROJ="RideWind/ios/Runner.xcodeproj/project.pbxproj"

          # Ensure CODE_SIGN_STYLE is Automatic (in case it was changed to Manual)
          sed -i '' 's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' "$PBXPROJ"

          # Remove any hardcoded PROVISIONING_PROFILE_SPECIFIER (let Xcode manage it)
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";//g' "$PBXPROJ"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*;//g' "$PBXPROJ"

          echo "✅ Xcode project configured for automatic signing"

      # --- Archive with xcodebuild + API Key auto-signing ---
      - name: Archive iOS app (auto-signed)
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.HAS_API_KEY == 'true'
        run: |
          # First, let Flutter generate the Xcode project with proper build settings
          cd RideWind
          flutter build ios --release --no-codesign

          # Now archive with xcodebuild using API Key for automatic signing
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            DEVELOPMENT_TEAM=9YSTN2JSTJ \
            CODE_SIGN_STYLE=Automatic \
            archive

          echo "✅ Archive created at $RUNNER_TEMP/Runner.xcarchive"

      # --- Export IPA with automatic signing ---
      - name: Generate ExportOptions.plist
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.HAS_API_KEY == 'true'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>9YSTN2JSTJ</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          echo "✅ ExportOptions.plist generated (automatic signing, no profile needed)"

      - name: Export IPA
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.HAS_API_KEY == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa_output" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

          # Copy IPA to expected Flutter output location
          mkdir -p RideWind/build/ios/ipa
          cp "$RUNNER_TEMP/ipa_output/"*.ipa RideWind/build/ios/ipa/
          echo "✅ IPA exported successfully"
          ls -la RideWind/build/ios/ipa/

      # --- Fallback: no signing available ---
      - name: Build iOS (no codesign fallback)
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.HAS_API_KEY != 'true'
        run: |
          echo "::warning::No API Key configured. Building without codesign."
          flutter build ios --release --no-codesign
        working-directory: RideWind

      # --- Upload to TestFlight using xcrun notarytool + altool ---
      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.HAS_API_KEY == 'true'
        run: |
          IPA_PATH=$(find RideWind/build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA found for upload"
            exit 1
          fi

          echo "Uploading $IPA_PATH to TestFlight..."

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

          echo "✅ IPA uploaded to TestFlight successfully"

      # --- Cleanup ---
      - name: Clean up API Key
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/private_keys"
          rm -f "$RUNNER_TEMP/ExportOptions.plist"
          rm -rf "$RUNNER_TEMP/Runner.xcarchive"
          rm -rf "$RUNNER_TEMP/ipa_output"

  # ---------------------------------------------------------------
  #  Release: GitHub Release + China Server + app_version.json
  # ---------------------------------------------------------------
  release:
    name: Create Release & Deploy
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/app-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts/

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#app-}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          cd ./artifacts
          for f in app-*.apk; do
            # app-arm64-v8a-release.apk → zcritical-t1-v1.2.3-arm64-v8a.apk
            ABI=$(echo "$f" | sed 's/app-\(.*\)-release\.apk/\1/')
            mv "$f" "zcritical-t1-v${{ steps.version.outputs.VERSION }}-${ABI}.apk"
          done
          ls -la *.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "APP v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ steps.version.outputs.TAG }}
          files: |
            ./artifacts/zcritical-t1-v${{ steps.version.outputs.VERSION }}-*.apk
          generate_release_notes: true

      - name: Deploy arm64 APK to China server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "./artifacts/zcritical-t1-v${{ steps.version.outputs.VERSION }}-arm64-v8a.apk"
          target: "/www/wwwroot/sunnyklara.com/releases/"
          strip_components: 1

      - name: Verify China server deployment
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://sunnyklara.com/releases/zcritical-t1-v${{ steps.version.outputs.VERSION }}-arm64-v8a.apk" --connect-timeout 10)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::China server verification failed (HTTP $HTTP_CODE). APK available on GitHub Releases."
          else
            echo "China server deployment verified"
          fi

      - name: Update app_version.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date +%Y-%m-%d)
          DOWNLOAD_URL="https://sunnyklara.com/releases/zcritical-t1-v${VERSION}-arm64-v8a.apk"
          GITHUB_URL="https://github.com/SunnyKlara/Zcritical/releases/download/${{ steps.version.outputs.TAG }}/zcritical-t1-v${VERSION}-arm64-v8a.apk"

          NOTES=$(git tag -l --format='%(contents)' "${{ steps.version.outputs.TAG }}" 2>/dev/null | head -20 || echo "")
          if [ -z "$NOTES" ]; then
            NOTES="v${VERSION} update"
          fi
          NOTES_JSON=$(echo "$NOTES" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")

          CURRENT_BUILD=$(python3 -c "import json; d=json.load(open('RideWind/app_version.json')); print(d.get('latest_build', d.get('buildNumber', 1)))")

          python3 -c "
          import json
          data = {
            'latest_version': '${VERSION}',
            'latest_build': ${CURRENT_BUILD},
            'min_version': '1.0.0',
            'download_url': '${DOWNLOAD_URL}',
            'fallback_download_url': '${GITHUB_URL}',
            'ios_app_store_url': '',
            'release_notes': ${NOTES_JSON},
            'force_update': False,
            'rollout_percentage': 100,
            'version': '${VERSION}',
            'buildNumber': ${CURRENT_BUILD},
            'minSupportedVersion': '1.0.0',
            'downloadUrl': '${DOWNLOAD_URL}',
            'fallbackDownloadUrl': '${GITHUB_URL}',
            'changelog': ${NOTES_JSON},
            'releaseDate': '${DATE}',
            'forceUpdate': False,
            'rolloutPercentage': 100
          }
          with open('RideWind/app_version.json', 'w', encoding='utf-8') as f:
            json.dump(data, f, indent=2, ensure_ascii=False)
            f.write('\n')
          "

      - name: Commit and push app_version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RideWind/app_version.json
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "chore(release): auto-update app_version.json for v${{ steps.version.outputs.VERSION }} [skip ci]"
            git push origin HEAD:main
          }

  # ---------------------------------------------------------------
  #  Notifications (Telegram + 企业微信)
  # ---------------------------------------------------------------
  notify:
    name: Send Release Notification
    needs: [release]
    runs-on: ubuntu-latest
    if: always() && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/app-v'))
    steps:
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#app-}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Notify Telegram
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping"
            exit 0
          fi
          STATUS="${{ needs.release.result }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            TEXT="$EMOJI *Zcritical T1 v${{ steps.version.outputs.VERSION }}* 发布成功\n\n📦 [GitHub Release](https://github.com/SunnyKlara/Zcritical/releases/tag/${GITHUB_REF#refs/tags/})\n🇨🇳 国内下载已部署"
          else
            EMOJI="❌"
            TEXT="$EMOJI *Zcritical T1 v${{ steps.version.outputs.VERSION }}* 发布失败\n\n🔗 [查看日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi

          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"$TEXT\",\"parse_mode\":\"Markdown\"}" \
              --connect-timeout 10 --max-time 30)
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Telegram notification sent"
              break
            fi
            echo "::warning::Telegram attempt $i failed (HTTP $HTTP_CODE)"
            sleep 2
          done

      - name: Notify 企业微信
        continue-on-error: true
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          if [ -z "$WECOM_WEBHOOK_URL" ]; then
            echo "WeCom webhook not configured, skipping"
            exit 0
          fi
          STATUS="${{ needs.release.result }}"
          if [ "$STATUS" = "success" ]; then
            CONTENT="✅ Zcritical T1 v${{ steps.version.outputs.VERSION }} 发布成功\n\n📦 GitHub Release: https://github.com/SunnyKlara/Zcritical/releases/tag/${GITHUB_REF#refs/tags/}\n🇨🇳 国内下载已部署"
          else
            CONTENT="❌ Zcritical T1 v${{ steps.version.outputs.VERSION }} 发布失败\n\n🔗 查看日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "${{ secrets.WECOM_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$CONTENT\"}}" \
              --connect-timeout 10 --max-time 30)
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "WeCom notification sent"
              break
            fi
            echo "::warning::WeCom attempt $i failed (HTTP $HTTP_CODE)"
            sleep 2
          done
