name: Multi-Platform Build & Release

on:
  push:
    branches: [main]
    paths: ['RideWind/**']
    tags: ['v*', 'app-v*']
  pull_request:
    branches: [main]
    paths: ['RideWind/**']
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS IPA'
        type: boolean
        default: true

env:
  FLUTTER_VERSION: '3.x'

jobs:
  # ---------------------------------------------------------------
  #  Code Quality Check
  # ---------------------------------------------------------------
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: RideWind
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        working-directory: RideWind

  # ---------------------------------------------------------------
  #  Android APK Build (signed + version from tag)
  # ---------------------------------------------------------------
  build-android:
    name: Build Android APK
    needs: analyze
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_android }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: RideWind

      # --- Release signing setup ---
      - name: Setup release signing
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > RideWind/android/zcritical-release.jks
          cat > RideWind/android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storeFile=zcritical-release.jks
          EOF

      # --- Version extraction from tag ---
      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#app-}"
            VERSION="${VERSION#v}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "HAS_TAG=true" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version:' RideWind/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "HAS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        run: |
          if [ "${{ steps.version.outputs.HAS_TAG }}" = "true" ]; then
            BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
            flutter build apk --release \
              --build-name=${{ steps.version.outputs.VERSION }} \
              --build-number=$BUILD_NUMBER
          else
            flutter build apk --release
          fi
        working-directory: RideWind

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: RideWind/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ---------------------------------------------------------------
  #  iOS Build
  # ---------------------------------------------------------------
  build-ios:
    name: Build iOS
    needs: analyze
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: RideWind
      - name: Install CocoaPods
        run: |
          cd RideWind/ios
          pod install --repo-update
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
        working-directory: RideWind

  # ---------------------------------------------------------------
  #  Release: GitHub Release + China Server + app_version.json
  # ---------------------------------------------------------------
  release:
    name: Create Release & Deploy
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/app-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts/

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#app-}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv ./artifacts/app-release.apk ./artifacts/zcritical-t1-v${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "APP v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ steps.version.outputs.TAG }}
          files: |
            ./artifacts/zcritical-t1-v${{ steps.version.outputs.VERSION }}.apk
          generate_release_notes: true

      - name: Deploy APK to China server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "./artifacts/zcritical-t1-v${{ steps.version.outputs.VERSION }}.apk"
          target: "/www/wwwroot/sunnyklara.com/releases/"
          strip_components: 1

      - name: Verify China server deployment
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.DEPLOY_HOST }}/releases/zcritical-t1-v${{ steps.version.outputs.VERSION }}.apk" --connect-timeout 10)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::China server verification failed (HTTP $HTTP_CODE). APK available on GitHub Releases."
          else
            echo "China server deployment verified"
          fi

      - name: Update app_version.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date +%Y-%m-%d)
          DOWNLOAD_URL="https://sunnyklara.com/releases/zcritical-t1-v${VERSION}.apk"
          GITHUB_URL="https://github.com/SunnyKlara/Zcritical/releases/download/${{ steps.version.outputs.TAG }}/zcritical-t1-v${VERSION}.apk"

          NOTES=$(git tag -l --format='%(contents)' "${{ steps.version.outputs.TAG }}" 2>/dev/null | head -20 || echo "")
          if [ -z "$NOTES" ]; then
            NOTES="v${VERSION} update"
          fi
          NOTES_JSON=$(echo "$NOTES" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")

          CURRENT_BUILD=$(python3 -c "import json; d=json.load(open('RideWind/app_version.json')); print(d.get('latest_build', d.get('buildNumber', 1)))")

          python3 -c "
          import json
          data = {
            'latest_version': '${VERSION}',
            'latest_build': ${CURRENT_BUILD},
            'min_version': '1.0.0',
            'download_url': '${DOWNLOAD_URL}',
            'fallback_download_url': '${GITHUB_URL}',
            'ios_app_store_url': '',
            'release_notes': ${NOTES_JSON},
            'force_update': False,
            'version': '${VERSION}',
            'buildNumber': ${CURRENT_BUILD},
            'minSupportedVersion': '1.0.0',
            'downloadUrl': '${DOWNLOAD_URL}',
            'fallbackDownloadUrl': '${GITHUB_URL}',
            'changelog': ${NOTES_JSON},
            'releaseDate': '${DATE}',
            'forceUpdate': False
          }
          with open('RideWind/app_version.json', 'w', encoding='utf-8') as f:
            json.dump(data, f, indent=2, ensure_ascii=False)
            f.write('\n')
          "

      - name: Commit and push app_version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RideWind/app_version.json
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "chore(release): auto-update app_version.json for v${{ steps.version.outputs.VERSION }} [skip ci]"
            git push origin HEAD:main
          }
